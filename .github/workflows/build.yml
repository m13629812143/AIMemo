name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建 prod 环境的 debug APK（用于测试）
      - name: Build prod debug APK
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: ./gradlew assembleProdDebug -PDEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"

      - name: Upload prod debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-memo-prod-debug
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
          retention-days: 30

      # 构建 prod 环境的 release APK（正式版）
      - name: Build prod release APK
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: ./gradlew assembleProdRelease -PDEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"

      - name: Upload prod release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-memo-prod-release
          path: app/build/outputs/apk/prod/release/app-prod-release-unsigned.apk
          retention-days: 30

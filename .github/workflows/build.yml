name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建 prod debug APK（API Key 由用户在 App 内设置，无需注入）
      - name: Build prod debug APK
        run: ./gradlew assembleProdDebug

      - name: Upload prod debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-memo-prod-debug
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
          retention-days: 30
